# Config for mirror-mouse dataset in original
# Lightning Pose publication (Biderman, Whiteway et al., Nat Methods 2024).
# For field descriptions see `config_default.yaml` in this directory.

data:
  image_resize_dims:
    height: 256
    width: 256
  data_dir: /home/zeus/content/data/mirror-mouse
  video_dir: /home/zeus/content/data/mirror-mouse/videos
  csv_file: CollectedData.csv
  num_keypoints: 17
  keypoint_names:
    - paw1LH_top
    - paw2LF_top
    - paw3RF_top
    - paw4RH_top
    - tailBase_top
    - tailMid_top
    - nose_top
    - obs_top
    - paw1LH_bot
    - paw2LF_bot
    - paw3RF_bot
    - paw4RH_bot
    - tailBase_bot
    - tailMid_bot
    - nose_bot
    - obsHigh_bot
    - obsLow_bot
  mirrored_column_matches:
    - [0, 1, 2, 3, 4, 5, 6]
    - [8, 9, 10, 11, 12, 13, 14]
  columns_for_singleview_pca: [0, 1, 2, 3, 4, 5, 6, 8, 9, 10, 11, 12, 13, 14]

training:
  imgaug: dlc
  train_batch_size: 8
  val_batch_size: 48
  test_batch_size: 48
  train_prob: 0.8
  val_prob: 0.1
  train_frames: 1
  num_gpus: 1
  early_stop_patience: 3
  unfreezing_epoch: 20
  min_epochs: 300
  max_epochs: 750
  log_every_n_steps: 10
  check_val_every_n_epoch: 5
  rng_seed_data_pt: 0
  rng_seed_model_pt: 0
  optimizer: Adam
  optimizer_params:
    learning_rate: 1e-3
  lr_scheduler: multisteplr
  lr_scheduler_params:
    multisteplr:
      milestones: [150, 200, 250]
      gamma: 0.5

model:
  losses_to_use: []
  backbone: resnet50_animal_ap10k
  model_type: heatmap
  heatmap_loss_type: mse
  model_name: rebuttal23a

dali:
  base:
    train:
      sequence_length: 32
    predict:
      sequence_length: 128
  context:
    train:
      batch_size: 16
    predict:
      sequence_length: 96

losses:
  pca_multiview:
    log_weight: 10.7
    components_to_keep: 3
    epsilon: null
  pca_singleview:
    log_weight: 10.7
    components_to_keep: 0.99
    epsilon: null
  temporal:
    log_weight: 10.7
    epsilon: 20.0
    prob_threshold: 0.05

eval:
  predict_vids_after_training: true
  save_vids_after_training: false
  test_videos_directory: ${data.video_dir}
  confidence_thresh_for_vid: 0.90

callbacks:
  anneal_weight:
    attr_name: total_unsupervised_importance
    init_val: 0.0
    increase_factor: 0.01
    final_val: 1.0
    freeze_until_epoch: 0
