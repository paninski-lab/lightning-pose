# Sample single-view Lightning Pose config with reasonable defaults.

data:
  # resize dimensions to streamline model creation
  # must each be a multiple of 128 (e.g., 128, 256, 384, 512)
  image_resize_dims:
    height: null
    width: null
  # ABSOLUTE path to data directory
  data_dir: /replace/with/your/path
  # ABSOLUTE path to unlabeled videos' directory
  video_dir: /replace/with/your/path
  # location of labels; this should be relative to `data_dir`
  # or an absolute path.
  csv_file: CollectedData.csv
  # total number of keypoints
  num_keypoints: null
  # keypoint names
  keypoint_names: null
  # for mirrored setups with all keypoints defined in same csv file, define matching
  # columns for different keypoints (assumes x-y-x-y interleaving)
  # each list corresponds to a single view, so in the example below there are 2 views
  # keypoint 0 is from view 0 and matches up with keypoint 8 from view 2
  # columns that correspond to keypoints only labeled in a single view are omitted
  # this info is only used for the multiview pca loss
  mirrored_column_matches: null
  # list of indices of keypoints used for pca singleview loss (use order of labels file)
  columns_for_singleview_pca: null

training:
  # select from one of several predefined image/video augmentation pipelines
  # default: resizing only
  # dlc: imgaug pipeline implemented in DLC 2.0 package
  # dlc-lr: dlc augmentation plus 180 degree rotations
  # dlc-top-down: dlc augmentations plus 90, 180, and 270 degree rotations
  imgaug: dlc
  # apply a random horizontal flip with probability 0.5 after the standard imgaug pipeline;
  # keypoints ending in _left/_right are swapped with their partner to preserve label identity;
  # every _left keypoint must have a matching _right (and vice versa), else an error is raised;
  imgaug_hflip: false
  # batch size of labeled data during training
  train_batch_size: 16
  # batch size of labeled data during validation
  val_batch_size: 32
  # batch size of labeled data during test
  test_batch_size: 32
  # fraction of labeled data used for training
  train_prob: 0.95
  # fraction of labeled data used for validation (remaining used for test)
  val_prob: 0.05
  # <=1 - fraction of total train frames (determined by `train_prob`) used for training
  #  >1 - absolute number of train frames to use
  # note: 1 is treated as 1.0, meaning 100% of available train frames
  train_frames: 1
  # number of gpus to train a single model
  num_gpus: 1
  # epoch at which backbone network weights begin updating
  unfreezing_epoch: 20
  # max training epochs; training may exit before due to early stopping
  # min_epochs and max_epochs must both be set (or both absent for step-based mode)
  min_epochs: 300
  max_epochs: 300
  # frequency to log training metrics for tensorboard (one step is one batch)
  log_every_n_steps: 10
  # frequency to log validation metrics for tensorboard
  check_val_every_n_epoch: 5
  # save model weights every n epochs
  # must be divisible by check_val_every_n_epoch; if null, only best weights are saved
  ckpt_every_n_epochs: null
  # perform early stopping based on validation loss
  early_stopping: false
  # number of validation checks with no improvement before stopping (requires early_stopping: true)
  early_stop_patience: 3
  # rng seed for labeled batches
  rng_seed_data_pt: 0
  # rng seed for weight initialization
  rng_seed_model_pt: 0
  # optimizer: Adam | AdamW
  # recommended: Adam for resnet backbones, AdamW for ViT backbones
  optimizer: Adam
  optimizer_params:
    learning_rate: 1e-3
  # learning rate scheduler: multisteplr | [todo: reducelronplateau, cosine]
  lr_scheduler: multisteplr
  lr_scheduler_params:
    multisteplr:
      # epochs at which to reduce learning rate by `gamma`
      # values should be between unfreezing_epoch and max_epochs
      milestones: [150, 200, 250]
      gamma: 0.5
  # how to treat missing hand labels; false to drop, true to force uniform heatmaps
  # true will lead to better confidence values
  uniform_heatmaps_for_nan_keypoints: true
  # --- ALTERNATIVE: step-based training ---
  # Replace the epoch-based fields above with these step-based equivalents.
  # Use steps when dataset size varies and you want a fixed compute budget.
  # You CANNOT mix step- and epoch-based fields; remove epoch fields entirely.
  #
  # unfreezing_step: 600         # replaces unfreezing_epoch
  # min_steps: 9000             # replaces min_epochs
  # max_steps: 9000             # replaces max_epochs
  # lr_scheduler_params:
  #   multisteplr:
  #     milestone_steps: [4500, 6000, 7500]      # replaces milestones
  #     gamma: 0.5

model:
  # list of unsupervised losses to use during training
  # valid entries: "pca_singleview" | "pca_multiview" | "temporal" | "unimodal_mse" | "unimodal_kl"
  # empty list trains a fully supervised model
  # note: listing a loss here activates it; the `losses` section below only sets hyperparameters
  losses_to_use: []
  # backbone network:
  # resnet18 | resnet34 | resnet50 | resnet101 | resnet152
  # resnet50_animal_apose | resnet50_animal_ap10k
  # resnet50_human_jhmdb | resnet50_human_res_rle | resnet50_human_top_res | resnet50_human_hand
  # efficientnet_b0 | efficientnet_b1 | efficientnet_b2
  # vits_dino | vitb_dino
  # vitb_imagenet
  # vitb_sam
  backbone: resnet50_animal_ap10k
  # prediction mode: regression | heatmap | heatmap_mhcrnn (context)
  model_type: heatmap
  # which heatmap loss to use: mse | kl | js
  heatmap_loss_type: mse
  # label used when logging metrics; does not affect output directory path
  model_name: test
  # path to a .ckpt file to resume training from a checkpoint; null to train from scratch
  checkpoint: null

dali:
  base:
    train:
      sequence_length: 32
    predict:
      sequence_length: 96
  context:
    train:
      batch_size: 16
    predict:
      sequence_length: 96

# hyperparameters for each loss type
# these values are only used when a loss is listed in model.losses_to_use above
losses:
  # loss = projection onto the discarded eigenvectors
  pca_multiview:
    # actual weight = 1 / (2 * exp(log_weight)); higher values reduce the loss contribution
    log_weight: 11.0
    # predictions should lie within the low-d subspace spanned by these components
    components_to_keep: 3
    # absolute error (in pixels) below which pca loss is zeroed out
    # if null, an empirical epsilon is computed from the labeled data
    epsilon: null
  # loss = projection onto the discarded eigenvectors
  pca_singleview:
    # actual weight = 1 / (2 * exp(log_weight)); higher values reduce the loss contribution
    log_weight: 11.0
    # predictions should lie within the low-d subspace spanned by components
    # that describe this fraction of variance (float in (0, 1)) or an integer count
    components_to_keep: 0.99
    # absolute error (in pixels) below which pca loss is zeroed out
    # if null, an empirical epsilon is computed from the labeled data
    epsilon: null
  # loss = norm of distance between successive timepoints
  temporal:
    # actual weight = 1 / (2 * exp(log_weight)); higher values reduce the loss contribution
    log_weight: 11.0
    # epsilon-insensitive threshold in pixels; frame-to-frame diffs below this are not penalized
    # can be a single float or a list of floats (one per keypoint, in csv column order)
    epsilon: 20.0
    # heatmaps whose max probability is below this threshold are excluded from the loss
    prob_threshold: 0.05

eval:
  # run prediction on test_videos_directory after training completes
  predict_vids_after_training: true
  # absolute path to directory containing videos for post-training prediction
  test_videos_directory: ${data.video_dir}
  # save prediction-annotated .mp4 files after training
  save_vids_after_training: false
  # matplotlib colormap name for prediction visualization
  # sequential: viridis, plasma, magma, inferno, cool, etc.
  # diverging: RdBu, coolwarm, Spectral, etc.
  colormap: "cool"
  # keypoints below this confidence are not drawn in labeled videos
  confidence_thresh_for_vid: 0.90

callbacks:
  anneal_weight:
    attr_name: total_unsupervised_importance
    init_val: 0.0
    increase_factor: 0.01
    final_val: 1.0
    freeze_until_epoch: 60

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
