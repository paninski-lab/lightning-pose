# See documentation in scripts/buildbot/README
name: Run tests

on:
  push:
    branches:
      - main
  pull_request_target:
    types: [opened, synchronize, reopened]

# To cancel a currently running workflow from the same PR, branch or tag when a new workflow is triggered
# https://stackoverflow.com/a/72408109
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source for Codecov file network
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Add SSH key to agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.MW3323_AXON_SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          # -- BEGIN big multi-line echo
          echo "# axon-remote.rc.zi.columbia.edu:55 SSH-2.0-OpenSSH_7.4
          |1|+3hOuN58f3OYR0UVNxIb6YovXXg=|LOg1/T6aXAXueBDZF7F0Q40bR4c= ssh-rsa 
          # axon-remote.rc.zi.columbia.edu:55 SSH-2.0-OpenSSH_7.4
          |1|3RdQExkv97FXtG6GKAeTJkFis4U=|pWXmI16aPGaD61VMXmiwpFoWQ0I= ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBLoRVsK/NaUijc048vVXUtH0wyQ2+K3J8ZCco28gmXPZF0OvmI4YqhcCRV6gV2jvvnTWXJUiF3bYPGmrd/r/MUQ=
          # axon-remote.rc.zi.columbia.edu:55 SSH-2.0-OpenSSH_7.4
          |1|v7FZfZPNLXSqe5wQAPZOx91XxuE=|iFXOp8qxb7NQAM6D8ijlh43vkis= ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGoEKs+uPmYc6thM8egx24kg6kZ2lYFOJZ9h+2WbDsY6
          # axon-remote.rc.zi.columbia.edu:55 SSH-2.0-OpenSSH_7.4
          # axon-remote.rc.zi.columbia.edu:55 SSH-2.0-OpenSSH_7.4" >> ~/.ssh/known_hosts
          # -- END
          chmod 600 ~/.ssh/known_hosts

      - name: Execute build script via SSH
        # -t flag is necessary to forward github cancellation event (SIGINT)
        run: |
          PR="${{ github.event.pull_request.number }}"
          ssh -tt -p 55 mw3323@axon-remote.rc.zi.columbia.edu "sh buildbot_lp/build_srun.sh ${PR:-0}"

      - name: Copy coverage report from remote
        run: |
          scp -P 55 mw3323@axon-remote.rc.zi.columbia.edu:~/buildbot_lp/coverage.xml coverage.xml

      - name: Fix coverage XML source tags
        # coverage.py emits <source>.</source> (relative) when run on the remote server;
        # replace it with the runner's absolute checkout path so Codecov can resolve filenames.
        # Also strip any empty <source/> tags that coverage.py may emit alongside it.
        run: |
          python -c "
          import re, pathlib
          p = pathlib.Path('coverage.xml')
          text = p.read_text()
          text = re.sub(r'<source></source>\s*', '', text)
          text = text.replace('<source>.</source>', '<source>/home/runner/work/lightning-pose/lightning-pose</source>')
          p.write_text(text)
          "

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: paninski-lab/lightning-pose
          override_commit: ${{ github.event.pull_request.head.sha || github.sha }}
